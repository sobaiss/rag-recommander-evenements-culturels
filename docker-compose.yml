services:

  api:
    build: .
    ports:
      - "8000:8000"
    env_file: .env
    volumes:
      - ./vector_db:/app/vector_db
      - ./database:/app/database
      - ./data:/app/data
    command:
      - uv
      - run
      - uvicorn
      - api.main:app
      - --host
      - "0.0.0.0"
      - --port
      - "8000"
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000/health')\""]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    restart: unless-stopped

  chatbot:
    build: .
    ports:
      - "8501:8501"
    env_file: .env
    volumes:
      - ./vector_db:/app/vector_db
      - ./database:/app/database
      - ./data:/app/data
    command:
      - uv
      - run
      - streamlit
      - run
      - app/Chat.py
      - --server.port=8501
      - --server.address=0.0.0.0
      - --server.headless=true
    depends_on:
      api:
        condition: service_healthy
    restart: unless-stopped

  feedback:
    build: .
    ports:
      - "8502:8502"
    env_file: .env
    volumes:
      - ./vector_db:/app/vector_db
      - ./database:/app/database
      - ./data:/app/data
    command:
      - uv
      - run
      - streamlit
      - run
      - app/FeedbackViewer.py
      - --server.port=8502
      - --server.address=0.0.0.0
      - --server.headless=true
    depends_on:
      api:
        condition: service_healthy
    restart: unless-stopped
